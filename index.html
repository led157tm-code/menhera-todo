<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>メンヘラ彼女ToDo</title>

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>

#girl {
  width: 120px;
  height: auto;
  margin: 10px auto;
  display: block;
  border-radius: 20px;
}

.soft {
  background: #ffffff;
}

.middle {
  background: #ffb3c1;
  animation: pulse 2s infinite;
}

.hard {
  background: #ff4d4d;
  filter: contrast(1.4);
}

.crazy {
  background: #8b0000;
  animation: shake 0.15s infinite;
  position: relative;
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.8; }
  100% { opacity: 1; }
}

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(2px,2px); }
  50% { transform: translate(-2px,2px); }
  75% { transform: translate(2px,-2px); }
  100% { transform: translate(0,0); }
}

@keyframes flicker {
  0% { opacity: 0.1; }
  50% { opacity: 0.3; }
  100% { opacity: 0.1; }
}

@keyframes noiseAnim {
  0% { transform: translate(0,0); }
  50% { transform: translate(-5px,5px); }
  100% { transform: translate(5px,-5px); }
}

#chat {
  height: 70vh;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  background: #f5f5f5;
}

.bubble {
  max-width: 70%;
  padding: 8px 12px;
  border-radius: 18px;
  margin: 5px;
}

.me {
  background: #06C755;
  color: white;
  align-self: flex-end;
}

.girl {
  background: white;
  color: black;
  border: 1px solid #ddd;
}

#header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  background: #06C755;
  color: white;
}

#girlIcon {
  width: 120px;
  height: 120px;
  border-radius: 50%;
}

.task {
  background: #fff;
  border: 1px solid #ddd;
  padding: 10px;
  margin: 8px auto;
  width: 90%;
  max-width: 400px;
  border-radius: 10px;
  text-align: left;
}

.taskTime {
  font-size: 12px;
  color: #666;
  margin-top: 5px;
}

#badge {
  background: red;
  color: white;
  display: inline-block;
  padding: 5px 10px;
  border-radius: 20px;
  margin: 10px;
  font-size: 14px;
}

.choiceBtn {
  display: block;
  width: 80%;
  margin: 5px auto;
  padding: 10px;
  border-radius: 20px;
  border: none;
  background: #eee;
  cursor: pointer;
}

.readDone {
  opacity: 0.6;
}

.crazy::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255,0,0,0.1);
  pointer-events: none;
  animation: flicker 0.2s infinite;
}

.noise {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  background-image: url("noise.png");
  opacity: 0.1;
  mix-blend-mode: overlay;
  animation: noiseAnim 0.2s infinite;
}

body {
  margin: 0;
  padding: 0;
  font-size: 16px;
  font-family: -apple-system, sans-serif;
}

body {
  max-width: 500px;
  margin: 0 auto;
}

#header {
  flex-direction: row;
  justify-content: center;
  flex-wrap: wrap;
}

#girl {
  width: 90px;
}

#chat {
  height: 55vh;
  padding: 8px;
}

#inputArea {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 10px;
}

#inputArea input,
#inputArea button {
  font-size: 16px;
  padding: 10px;
}

.task {
  width: 95%;
  max-width: none;
  font-size: 15px;
}

#badge {
  font-size: 13px;
  padding: 4px 8px;
}

</style>
</head>

<body>

<h2>彼女とのトーク</h2>

<div id="badge">未読: 0</div>

<div id="header">
  <img id="girl" src="happy.png">
  <div>
    <div id="girlName">彼女</div>
    <div id="status">soft</div>
  </div>
</div>

<div id="chat"></div>

<div id="choices"></div>

<div id="inputArea">
  <input id="taskInput" placeholder="タスク">
  <input id="deadlineInput" type="datetime-local">
  <button onclick="sendTaskFromInput()">➤</button>
</div>

<h3>タスク一覧</h3>
<div id="taskList"></div>

<div class="noise"></div>

<audio id="bgm" src="bgm_soft.mp3" preload="auto"></audio>
<audio id="se"></audio>
<p id="message"></p>

<script>

let audioReady = false;

function unlockAudio() {
  const bgm = document.getElementById("bgm");
  if (!bgm) return;

  bgm.volume = 0.5;
  bgm.loop = true;

  bgm.play().catch(() => {});
}

document.addEventListener("click", () => {
  if (!audioReady) {
    unlockAudio();
  }
});

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

let lastState = "soft";
let lastSendTime = 0;
let unreadCount = 0;

let madnessLevel = 0;
let lastObsessedTask = null;
let lastUserAction = Date.now();

let audioUnlocked = false;
let bgmTimeout = null;
let notificationLock = false;

let introDone = false;
let justRead = false;
let lastLine = "";
let notificationAsked = false;

const title = document.querySelector("h2");

const bgmList = {
  soft: "bgm_soft.mp3",
  middle: "bgm_middle.mp3",
  hard: "bgm_hard.mp3",
  crazy: "bgm_crazy.mp3"
};

function getPhase() {
  if (madnessLevel < 3) return "normal";
  if (madnessLevel < 6) return "dependent";
  if (madnessLevel < 10) return "unstable";
  if (madnessLevel < 15) return "broken";
  return "entity";
}

function updateBadge() {
  const badge = document.getElementById("badge");
  badge.textContent = "未読: " + unreadCount;

  if (unreadCount === 0) {
    badge.style.display = "none";
  } else {
    badge.style.display = "inline-block";
  }
}

function showChoices(options) {
  const box = document.getElementById("choices");
  if (!box) return;

  box.innerHTML = "";

  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "choiceBtn";
    btn.textContent = opt.text;

    btn.onclick = () => {
      opt.action();
      box.innerHTML = "";
    };

    box.appendChild(btn);
  });
}

function renderTasks() {
  const list = document.getElementById("taskList");
  if (!list) return;

  list.innerHTML = "";

  tasks.forEach((task, index) => {

    const div = document.createElement("div");
    div.className = "task";

    const timeLeft = task.deadline - Date.now();

let timeText = "";

if (timeLeft < 0) {
  timeText = "⚠ 期限切れ";
} else {
  const hours = Math.floor(timeLeft / (1000 * 60 * 60));
  const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
  timeText = `あと ${hours}時間${minutes}分`;
}

    div.innerHTML = `
      <div><b>${task.text}</b></div>
      <div class="taskTime">${timeText}</div>
      <button onclick="completeTask(${index})">終わった</button>
    `;

    list.appendChild(div);
  });
}

function completeTask(index) {

  const task = tasks[index];

  addChat("me", "おわった");

  if (!window.clearCount) window.clearCount = 0;
  window.clearCount++;

  const praise = [
    "えらすぎ",
    "ちゃんとやるじゃん",
    "余裕だよね"
  ];

  sendLine(random(praise));

  if (window.clearCount % 3 === 0) {
    setTimeout(() => {
      sendLine("今日ちょっとすごいよ…");
    }, 800);
  }

  tasks.splice(index, 1);

  save();
  renderTasks();

  updateMadness("soft");
}

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

const states = {
  soft: { img: "happy.png", lines: ["まだ余裕だよね？"] },
  middle: { img: "normal.png", lines: ["そろそろやばいよ？"] },
  hard: { img: "angry.png", lines: ["ちゃんとやってよ"] },
  crazy: { img: "crazy.png", lines: ["なんでやってないの？"] },
  happy: { img: "happy.png", lines: ["えらい！"] }
};

const alertLines = {
  hard: [
    "急いで！時間ないよ？",
    "まだ終わってないの？",
    "そろそろ本気出してよ",
    "ほんとに間に合うと思ってる？"
  ],
  crazy: [
    "なんでやってないの！？",
    "もう手遅れだよ？",
    "ほんとに大丈夫？？",
    "ねぇ、見てるよね？",
    "既読ついてるよね？",
    "無視しないでよ",
    "ちゃんとやってって言ったよね？"
  ]
};

function random(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function addChat(type, text) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function updateMadness(state) {
  if (state === "crazy") {
    madnessLevel = Math.min(madnessLevel + 1, 20);
  } else {
    madnessLevel = Math.max(0, madnessLevel - 1);
  }
}

function changeState(state) {
  document.body.className = state;

  const girl = document.getElementById("girl");
  if (girl && states[state]) {
    girl.src = states[state].img;
  }

  const status = document.getElementById("status");
  if (status) status.textContent = state;

  const title = document.querySelector("h2");
  if (title) {
    if (state === "soft") title.textContent = "彼女（安定）";
    if (state === "middle") title.textContent = "彼女（不安）";
    if (state === "hard") title.textContent = "彼女（不安定）";
    if (state === "crazy") title.textContent = "彼女（危険）";
  }

  const bgm = document.getElementById("bgm");
  const newSrc = bgmList[state];

  if (bgm && newSrc && !bgm.src.includes(newSrc)) {
    bgm.pause();
    bgm.currentTime = 0;
    bgm.src = newSrc;

    const playPromise = bgm.play();
    if (playPromise !== undefined) {
      playPromise.catch(() => {});
    }
  }
}
  
function markAllAsRead() {
  const msgs = document.querySelectorAll(".bubble.girl");

  msgs.forEach(msg => {
    msg.classList.add("readDone");
  });

  unreadCount = 0;
  updateBadge();
}

function sendLine(msg) {
  const delay = 500 + Math.random() * 1500;

  setTimeout(() => {

    const now = Date.now();
    if (now - lastSendTime < 800) return;
    if (msg === lastLine) return;

    lastSendTime = now;
    lastLine = msg;

    showFakeNotification("彼女", msg);
    playSE();

    unreadCount++;
    updateBadge();

    const chat = document.getElementById("chat");
    const wrapper = document.createElement("div");

    const bubble = document.createElement("div");
    bubble.className = "bubble girl";
    bubble.textContent = msg;

    wrapper.appendChild(bubble);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;

  }, delay);
}

function playSE() {
  const se = document.getElementById("se");
  se.src = "se.mp3";
  se.currentTime = 0;
  se.play().catch(()=>{});
}

function showFakeNotification(title, msg) {
  if (notificationLock) return;
  notificationLock = true;

  const box = document.createElement("div");

  box.style.position = "fixed";
  box.style.top = "10px";
  box.style.left = "50%";
  box.style.transform = "translateX(-50%) translateY(-20px)";
  box.style.background = "#06C755";
  box.style.color = "#fff";
  box.style.padding = "10px 15px";
  box.style.borderRadius = "20px";
  box.style.zIndex = "9999";

  box.style.opacity = "0";
  box.style.transition = "all 0.3s ease";

  box.textContent = `${title}：${msg}`;
  document.body.appendChild(box);

  setTimeout(() => {
    box.style.opacity = "1";
    box.style.transform = "translateX(-50%) translateY(0)";
  }, 10);

  setTimeout(() => {
    box.style.opacity = "0";
    box.style.transform = "translateX(-50%) translateY(-20px)";
  }, 2000);

  setTimeout(() => {
    box.remove();
    notificationLock = false;
  }, 2500);
}

function sendTaskFromInput() {
  const input = document.getElementById("taskInput");
  const text = input.value.trim();

  const deadlineInput = document.getElementById("deadlineInput");
  const deadlineValue = deadlineInput.value;

  let deadline;

if (deadlineValue) {
  deadline = new Date(deadlineValue).getTime();
} else {
  
  deadline = Date.now() + 60 * 60 * 1000;
}

  addChat("me", text);

  tasks.push({
  text: text,
  deadline: deadline
});

  save();

renderTasks();

  input.value = "";
  deadlineInput.value = "";

  setTimeout(() => {
    sendLine("それやるんだね、見てるよ");
  }, 600);
}

document.addEventListener("click", () => {

  if (!notificationAsked && Notification.permission === "default") {
    Notification.requestPermission();
    notificationAsked = true;
  }

  if (!audioUnlocked) {
    const bgm = document.getElementById("bgm");

    bgm.src = "bgm_soft.mp3"; 
    bgm.volume = 0.5;
    bgm.loop = true;

    bgm.play().then(() => {
      audioUnlocked = true;
    }).catch(()=>{});
  }

  markAllAsRead();
});

window.addEventListener("load", () => {

  const last = localStorage.getItem("lastVisit");

  if (last && Date.now() - last > 60000) {
    sendLine("…さっきまでいなかったよね？");
  }

  startGame();
});

function startGame() {

  if (introDone) return;
  introDone = true;

  changeState("soft");

  setTimeout(() => {
    sendLine("おかえり。今日は何する？");

    showChoices([
      {
        text: "ちゃんとやるよ",
        action: () => {
          sendLine("ほんと？じゃあ見てるね♡");
        }
      },
      {
        text: "まだやらない",
        action: () => {
          sendLine("…また逃げるの？");
        }
      }
    ]);

  }, 500);
}

setInterval(() => {

  if (tasks.length === 0) {
    if (lastState !== "soft") {
      changeState("soft");
      lastState = "soft";
    }
    return;
  }

  const task = tasks
    .slice()
    .sort((a, b) => new Date(a.deadline) - new Date(b.deadline))[0];

  const diff = new Date(task.deadline) - Date.now();
  const diffDay = diff / (1000 * 60 * 60 * 24);

  let newState = "soft";

  if (diff < 0) newState = "crazy";
  else if (diffDay < 1) newState = "hard";
  else if (diffDay < 3) newState = "middle";

  updateMadness(newState);

  if (newState !== lastState) {
  lastState = newState;
  changeState(newState);
}

  if (newState === "soft" && Math.random() < 0.1) {
    sendLine("まだ余裕あるけど…ほんとに大丈夫？");
  }

  if (newState === "hard" || newState === "crazy") {
    if (Math.random() < 0.2) {
      sendLine(random(alertLines[newState]));
    }
  }

  if (newState === "crazy" && Math.random() < 0.2) {
    sendLine("ずっと見てるよ？");
  }

}, 1000);

setInterval(() => {
  renderTasks();
}, 3000);

</script>
</body>
</html>
